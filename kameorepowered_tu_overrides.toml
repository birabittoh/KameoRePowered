# Codegen hint deltas for title-update (--tu) builds.
#
# kameorepowered_config.toml is tuned for the UNPATCHED image. The title update
# rewrites code in a few regions, which (a) invalidates some vanilla function
# hints that now land mid-function in the patched image, and (b) introduces a new
# branch target the analyzer can't discover on its own. The build scripts derive
# the effective TU config by removing `remove_functions` from the base config and
# merging the [functions] additions below — so the vanilla build is untouched.
#
# Tuned for the update variant matching this project's default.xex (v0.0.2.1). A
# different regional base dump selects a different TU build and may need its own
# deltas.

# Drop the vanilla [[midasm_hook]] entries for TU builds: they target vanilla
# addresses the update shifts, and several change control flow, so injecting them
# into the patched image is unsafe. The combat and audio hooks below replace the
# stripped ones at re-derived patched-image addresses (volume, bink language
# track, the per-frame pump, and the startup-language override). The DLC hooks
# stay disabled because the update doesn't need them. One audio path remains
# disabled pending more RE: the string-table language reload (ReloadStringTable's
# signature changed + the speech-bank list head is unresolved) — see
# tu-audio-hook-addresses. The [[midasm_hook]] entries listed in THIS file are
# appended to the derived TU config after the vanilla ones are stripped.
strip_midasm_hooks = true

# The title update relocates setjmp/longjmp; override the vanilla manifest
# values so the derived TU manifest uses the correct patched-image addresses.
setjmp_address  = 0x82704060
longjmp_address = 0x82703F40

# Vanilla hints that fall mid-function in the patched image; forcing a function
# there fractures analysis and orphans the region's internal branches.
remove_functions = [0x820CD188, 0x82310CE0, 0x82325B40]

# Function entries the patched image needs but the analyzer doesn't find. The
# update reshapes code so some functions are only reached indirectly and aren't
# auto-discovered; each surfaces at runtime as "No function registered at <addr>"
# (XThread::Execute) and is fixed by registering it here.
[functions]
0x82324118 = {}  # backward branch target from 0x82324294
0x8251F320 = {}  # indirect-call target (present in vanilla; missed in patched image)
0x823516E8 = {}  # ctx.ctr.u32[0]
0x823517C8 = {}  # ctx.ctr.u32[0]
0x82154B90 = {}  # ctx.ctr.u32[0]
0x82526D80 = {}
0x824434E0 = {}  # ctx.ctr.u32[0]
0x82491768 = {}  # ctx.ctr.u32[0]
0x82363378 = {}  # ctx.ctr.u32[0]
0x82413180 = {}  # ctx.ctr.u32[0]
0x8233B048 = {}  # ctx.ctr.u32[0]
0x826F4600 = {}  # ctx.ctr.u32[0]
0x8233F948 = {}  # ctx.ctr.u32[0]
0x820CF010 = {}  # ctx.ctr.u32[0]
0x82706C70 = {}  # ctx.ctr.u32[0]

# Combat hooks (infinite energy / health / power-meter) re-derived for the
# patched image. The update recompiled the 0x8217Exxx–0x8217Fxxx region, so
# these differ from the vanilla addresses in kameorepowered_config.toml; each was
# verified per-hook (the uniform-shift assumption does not hold). The host
# functions live in src/kameorepowered_hooks_combat.cpp and stay compiled in TU
# builds. KameoInfiniteEnergyCurrent is INLINED in the patched image (no standalone
# function), so it has no hook here — set+max keep stored energy maxed anyway.

[[midasm_hook]]
address = 0x82180F38
name = "KameoInfiniteEnergy"
registers = ["r3"]

[[midasm_hook]]
address = 0x82181018
name = "KameoInfiniteEnergyMax"
registers = ["r3"]
return = true

# Power-meter copy. The update changed the source register r27 -> r28.
[[midasm_hook]]
address = 0x82180D60
name = "KameoRefillMeterFloat"
registers = ["r31", "r28"]
after_instruction = true

[[midasm_hook]]
address = 0x82180D9C
name = "KameoRefillMeterFloat"
registers = ["r31", "r28"]
after_instruction = true

[[midasm_hook]]
address = 0x82180C38
name = "KameoRefillMeterFloatPlus4"
registers = ["r31", "r28"]
after_instruction = true

[[midasm_hook]]
address = 0x82180C54
name = "KameoRefillMeterFloatPlus4"
registers = ["r31", "r28"]
after_instruction = true

[[midasm_hook]]
address = 0x821809CC
name = "KameoRefillHealth"
registers = ["r29"]
after_instruction = true

[[midasm_hook]]
address = 0x821809D8
name = "KameoRefillHealth"
registers = ["r29"]
after_instruction = true

[[midasm_hook]]
address = 0x821809F8
name = "KameoRefillHealth"
registers = ["r29"]
after_instruction = true

# Audio volume hooks re-derived for the patched image. The volume region was
# relocated (not recompiled), so registers match vanilla; verified per-site.
# Host code in src/kameorepowered_hooks_audio.cpp. See tu-audio-hook-addresses.
# (KameoOverrideAudioLanguage and the string-table language reload are NOT here —
# see the strip_midasm_hooks note above.)

# Per-category volume scaling — entry of SetCategoryVolume (sub_8230C050).
[[midasm_hook]]
address = 0x82335D38
name = "KameoOverrideVolume"
registers = ["r3", "f1"]

# Bink FMV master volume — entry of SetBinkLanguageTrackVolume (sub_826D21B0).
[[midasm_hook]]
address = 0x8270A9B0
name = "KameoOverrideBinkVolume"
registers = ["r5"]

# Bink language-track selection + volume (mid-function).
[[midasm_hook]]
address = 0x82273890
name = "KameoSetBinkLanguageTrackVolume"
registers = ["r27", "r29"]

# Per-frame pump that replays cached volumes (and, on vanilla, reloads the
# language string table + processes DLC swaps). On TU it drives the volume
# replay; the DLC swap is inert (flag off) and the language reload is disabled.
[[midasm_hook]]
address = 0x8225E550
name = "KameoProcessPendingDlcSwapMid"

# Startup audio-language override: intercepts the XGetLanguage return (import
# thunk 0x8270756C) right before the game's region remap, mirroring vanilla
# 0x820B5228 (the function relocated +0xCE8 and the recompiler moved the captured
# reg r31->r30, but the call+remap structure is identical). Without this the game
# selects the FMV language set from the system language (English) — the intro
# cutscene audio stays English even with user_language set. See tu-audio.
[[midasm_hook]]
address = 0x820B5F10
name = "KameoOverrideAudioLanguage"
registers = ["r3"]
