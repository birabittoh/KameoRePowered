name: Build kameo

on:
  workflow_call:
    inputs:
      publish_mode:
        description: "'artifact' for CI workflow-artifact, 'release' for GitHub release"
        required: true
        type: string
      artifact_name:
        description: "Artifact name prefix when publish_mode is 'artifact'"
        required: false
        type: string
        default: ""
      tag:
        description: "Release tag to embed in release artifact filenames"
        required: false
        type: string
        default: ""

env:
  ASSETS_REPO: ${{ vars.ASSETS_REPO }}
  ASSET_PATH: default.xex
  ASSET_CACHE_KEY: codegen-assets-v1

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            preset: win-amd64-release
            sdk_platform: win-amd64
            sdk_dir: win-amd64
            binary: out/build/win-amd64-release/kameorepowered.exe
            artifact_suffix: windows-x64

          - platform: linux
            runner: ubuntu-latest
            preset: linux-amd64-release
            sdk_platform: linux-amd64
            sdk_dir: linux-amd64
            binary: out/build/linux-amd64-release/kameorepowered
            artifact_suffix: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y ninja-build libgtk-3-dev libx11-xcb-dev

      - name: Install LLVM, CMake, Ninja (Windows)
        if: matrix.platform == 'windows'
        run: choco install llvm cmake ninja -y

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          variant: sccache
          key: ${{ matrix.platform }}-amd64

      - name: Download ReXGlue SDK
        shell: bash
        run: python scripts/download-sdk.py sdk/${{ matrix.sdk_dir }} --pinned

      - name: Cache XEX asset for codegen
        id: asset-cache
        uses: actions/cache@v5
        with:
          path: assets/${{ env.ASSET_PATH }}
          key: ${{ env.ASSET_CACHE_KEY }}

      - name: Fetch XEX asset
        if: steps.asset-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.ASSETS_TOKEN }}
        shell: bash
        run: |
          mkdir -p assets
          gh api -H "Accept: application/vnd.github.raw" \
            "repos/${{ env.ASSETS_REPO }}/contents/${{ env.ASSET_PATH }}" \
            > "assets/${{ env.ASSET_PATH }}"
          size=$(wc -c < "assets/${{ env.ASSET_PATH }}")
          echo "Fetched ${{ env.ASSET_PATH }} ($size bytes)"
          [ "$size" -ge 1048576 ] || { echo "Asset too small — fetch likely failed"; exit 1; }

      - name: Configure
        shell: bash
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/sdk/${{ matrix.sdk_dir }}" \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Codegen
        run: cmake --build --preset ${{ matrix.preset }} --target kameorepowered_codegen

      - name: Reconfigure (pick up generated/sources.cmake)
        shell: bash
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/sdk/${{ matrix.sdk_dir }}" \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j

      - name: sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true

      - name: Package
        shell: bash
        run: |
          if [ "${{ inputs.publish_mode }}" = "artifact" ]; then
            out="${{ inputs.artifact_name }}-${{ matrix.artifact_suffix }}"
          else
            out="kameorepowered-${{ inputs.tag }}-${{ matrix.artifact_suffix }}"
          fi

          mkdir pkg
          cp "${{ matrix.binary }}" pkg/

          if [ "${{ matrix.platform }}" = "linux" ]; then
            for so in sdk/${{ matrix.sdk_dir }}/lib/*.so; do
              base=$(basename "$so")
              case "$base" in *d.so|*rd.so) continue ;; esac
              cp "$so" pkg/
            done
            tar -czf "${out}.tar.gz" -C pkg .
            echo "ARTIFACT_PATH=${out}.tar.gz" >> "$GITHUB_ENV"
          else
            for dll in sdk/${{ matrix.sdk_dir }}/bin/*.dll; do
              [ -f "$dll" ] || continue
              base=$(basename "$dll")
              case "$base" in *d.dll|*rd.dll) continue ;; esac
              cp "$dll" pkg/
            done
            (cd pkg && zip -r "../${out}.zip" .)
            echo "ARTIFACT_PATH=${out}.zip" >> "$GITHUB_ENV"
          fi
          echo "ARTIFACT_NAME=${out}" >> "$GITHUB_ENV"

      - name: Upload CI artifact
        if: inputs.publish_mode == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: Upload release artifact
        if: inputs.publish_mode == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
