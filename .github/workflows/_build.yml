name: Build kameo

on:
  workflow_call:
    inputs:
      publish_mode:
        description: "'artifact' for CI workflow-artifact, 'release' for GitHub release"
        required: true
        type: string
      artifact_name:
        description: "Artifact name prefix when publish_mode is 'artifact'"
        required: false
        type: string
        default: ""
      tag:
        description: "Release tag to embed in release artifact filenames"
        required: false
        type: string
        default: ""

env:
  ASSETS_REPO: ${{ vars.ASSETS_REPO }}
  ASSET_PATH: default.xex
  ASSET_CACHE_KEY: codegen-assets-v1

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            preset: win-amd64-release
            sdk_platform: win-amd64
            sdk_dir: win-amd64
            binary: out/build/win-amd64-release/kameorepowered.exe
            artifact_suffix: windows-x64
            artifact_ext: .exe

          - platform: linux
            runner: ubuntu-latest
            preset: linux-amd64-release
            sdk_platform: linux-amd64
            sdk_dir: linux-amd64
            binary: out/build/linux-amd64-release/kameorepowered
            artifact_suffix: linux-x64
            artifact_ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y ninja-build libgtk-3-dev libx11-xcb-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev

      - name: Install LLVM, CMake, Ninja (Windows)
        if: matrix.platform == 'windows'
        run: choco install llvm cmake ninja -y

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          variant: sccache
          key: ${{ matrix.platform }}-amd64

      - name: Download ReXGlue SDK
        shell: bash
        run: python scripts/download-sdk.py sdk/${{ matrix.sdk_dir }} --pinned

      - name: Migrate (generate rexglue.cmake)
        shell: bash
        run: |
          sdk/${{ matrix.sdk_dir }}/bin/rexglue migrate --app_root .

      - name: Cache XEX asset for codegen
        id: asset-cache
        uses: actions/cache@v5
        with:
          path: assets/${{ env.ASSET_PATH }}
          key: ${{ env.ASSET_CACHE_KEY }}

      - name: Fetch XEX asset
        if: steps.asset-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.ASSETS_TOKEN }}
        shell: bash
        run: |
          mkdir -p assets
          gh api -H "Accept: application/vnd.github.raw" \
            "repos/${{ env.ASSETS_REPO }}/contents/${{ env.ASSET_PATH }}" \
            > "assets/${{ env.ASSET_PATH }}"
          size=$(wc -c < "assets/${{ env.ASSET_PATH }}")
          echo "Fetched ${{ env.ASSET_PATH }} ($size bytes)"
          [ "$size" -ge 1048576 ] || { echo "Asset too small — fetch likely failed"; exit 1; }

      - name: Rebuild SDL3 with audio backends (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          SDL_VER=$(strings sdk/${{ matrix.sdk_dir }}/lib/libSDL3.a | grep -m1 'SDL-[0-9].*-g[0-9a-f]')
          SDL_HASH=$(echo "$SDL_VER" | sed 's/.*-g//')
          echo "SDL version string: $SDL_VER"
          echo "Checking out SDL commit: $SDL_HASH"
          git clone --filter=blob:none https://github.com/libsdl-org/SDL.git /tmp/SDL
          git -C /tmp/SDL checkout "$SDL_HASH"
          cmake -S /tmp/SDL -B /tmp/SDL-build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DBUILD_SHARED_LIBS=OFF \
            -DSDL_STATIC=ON \
            -DSDL_SHARED=OFF \
            -DSDL_PIPEWIRE=ON -DSDL_PIPEWIRE_SHARED=ON \
            -DSDL_PULSEAUDIO=ON -DSDL_PULSEAUDIO_SHARED=ON \
            -DSDL_ALSA=ON -DSDL_ALSA_SHARED=ON \
            -DSDL_JACK=OFF \
            -DSDL_SNDIO=OFF \
            -DSDL_DISKAUDIO=OFF \
            -DSDL_TESTS=OFF \
            -DSDL_EXAMPLES=OFF \
            -DSDL_X11_XSCRNSAVER=OFF
          cmake --build /tmp/SDL-build -- -j$(nproc)
          cp /tmp/SDL-build/libSDL3.a sdk/${{ matrix.sdk_dir }}/lib/libSDL3.a

      - name: Configure
        shell: bash
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/sdk/${{ matrix.sdk_dir }}" \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Codegen
        run: cmake --build --preset ${{ matrix.preset }} --target kameorepowered_codegen

      - name: Reconfigure (pick up generated/sources.cmake)
        shell: bash
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/sdk/${{ matrix.sdk_dir }}" \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j

      - name: sccache stats
        if: always()
        shell: bash
        run: sccache --show-stats || true

      - name: Rename CI binary
        if: inputs.publish_mode == 'artifact'
        shell: bash
        run: cp "${{ matrix.binary }}" "${{ inputs.artifact_name }}-${{ matrix.artifact_suffix }}${{ matrix.artifact_ext }}"

      - name: Upload workflow artifact
        if: inputs.publish_mode == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-${{ matrix.artifact_suffix }}
          path: ${{ inputs.artifact_name }}-${{ matrix.artifact_suffix }}${{ matrix.artifact_ext }}
          if-no-files-found: error

      - name: Rename release binary
        if: inputs.publish_mode == 'release'
        shell: bash
        run: cp "${{ matrix.binary }}" "kameorepowered-${{ inputs.tag }}-${{ matrix.artifact_suffix }}${{ matrix.artifact_ext }}"

      - name: Upload release artifact
        if: inputs.publish_mode == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: kameorepowered-${{ inputs.tag }}-${{ matrix.artifact_suffix }}${{ matrix.artifact_ext }}
          if-no-files-found: error
