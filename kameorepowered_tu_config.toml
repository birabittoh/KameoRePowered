# Codegen config for title-update (--tu) builds.
#
# This is a standalone config — NOT derived from kameorepowered_config.toml.
# The vanilla config contains gap-fill fixups and midasm hooks that target
# unpatched-image addresses; those are invalid for the TU's patched image.

# The title update relocates setjmp/longjmp.
setjmp_address  = 0x82704060
longjmp_address = 0x82703F40

[functions]
# Function entries the patched image needs but the analyzer doesn't find.
0x82324118 = {}  # backward branch target from 0x82324294
0x8251F320 = {}  # indirect-call target (present in vanilla; missed in patched image)
0x823516E8 = {}  # ctx.ctr.u32[0]
0x823517C8 = {}  # ctx.ctr.u32[0]
0x82154B90 = {}  # ctx.ctr.u32[0]
0x82526D80 = {}
0x824434E0 = {}  # ctx.ctr.u32[0]
0x82491768 = {}  # ctx.ctr.u32[0]
0x82363378 = {}  # ctx.ctr.u32[0]
0x82413180 = {}  # ctx.ctr.u32[0]
0x8233B048 = {}  # ctx.ctr.u32[0]
0x826F4600 = {}  # ctx.ctr.u32[0]
0x8233F948 = {}  # ctx.ctr.u32[0]
0x820CF010 = {}  # ctx.ctr.u32[0]
0x82706C70 = {}  # ctx.ctr.u32[0]

# Combat hooks (infinite energy / health / power-meter) re-derived for the
# patched image. The update recompiled the 0x8217Exxx–0x8217Fxxx region;
# addresses verified per-hook. KameoInfiniteEnergyCurrent is INLINED in the
# patched image (no standalone function), so it has no hook here.

[[midasm_hook]]
address = 0x82180F38
name = "KameoInfiniteEnergy"
registers = ["r3"]

[[midasm_hook]]
address = 0x82181018
name = "KameoInfiniteEnergyMax"
registers = ["r3"]
return = true

[[midasm_hook]]
address = 0x82180D60
name = "KameoRefillMeterFloat"
registers = ["r31", "r28"]
after_instruction = true

[[midasm_hook]]
address = 0x82180D9C
name = "KameoRefillMeterFloat"
registers = ["r31", "r28"]
after_instruction = true

[[midasm_hook]]
address = 0x82180C38
name = "KameoRefillMeterFloatPlus4"
registers = ["r31", "r28"]
after_instruction = true

[[midasm_hook]]
address = 0x82180C54
name = "KameoRefillMeterFloatPlus4"
registers = ["r31", "r28"]
after_instruction = true

[[midasm_hook]]
address = 0x821809CC
name = "KameoRefillHealth"
registers = ["r29"]
after_instruction = true

[[midasm_hook]]
address = 0x821809D8
name = "KameoRefillHealth"
registers = ["r29"]
after_instruction = true

[[midasm_hook]]
address = 0x821809F8
name = "KameoRefillHealth"
registers = ["r29"]
after_instruction = true

# Audio volume hooks re-derived for the patched image.

[[midasm_hook]]
address = 0x82335D38
name = "KameoOverrideVolume"
registers = ["r3", "f1"]

[[midasm_hook]]
address = 0x8270A9B0
name = "KameoOverrideBinkVolume"
registers = ["r5"]

[[midasm_hook]]
address = 0x82273890
name = "KameoSetBinkLanguageTrackVolume"
registers = ["r27", "r29"]

# Per-frame pump (volume replay; DLC swap inert on TU).
[[midasm_hook]]
address = 0x8225E550
name = "KameoProcessPendingDlcSwapMid"

# Startup audio-language override.
[[midasm_hook]]
address = 0x820B5F10
name = "KameoOverrideAudioLanguage"
registers = ["r3"]

[rexcrt]
memcpy      = 0x82527D00
memmove     = 0x825266A0
memset      = 0x82528270
memcpy_s    = 0x8252A528
memmove_s   = 0x8252A460
XMemCpy     = 0x82528120
